<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BIBIPERO</title>

<style>

body{
  margin:0;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:#111;
  color:white;
  font-family:Arial,sans-serif;
}

.container{
  text-align:center;
}

.logo{
  font-size:70px;
  margin-bottom:10px;
}



.menu{
  display:flex;
  flex-direction:column;
  gap:15px;
  width:320px;
}

.menu a{
  text-decoration:none;
  color:white;

  background:#1f1f1f;

  padding:18px;

  border-radius:16px;

  font-size:22px;
  font-weight:bold;

  transition:0.2s;
}

.menu a:hover{
  transform:scale(1.03);
}

.tv{
  background:#1565c0;
}

.join{
  background:#2e7d32;
}

.qr{
  background:#ef6c00;
}

.rules{
  background:#8e24aa;
}

.version{
  margin-top:25px;
  opacity:.6;
}

.app{
  background:#c62828;
}

.subtitle{
  margin-top:-25px;
  margin-bottom:30px;
  opacity:.8;
  font-size:20px;
}
.main-logo{
  width:300px;
  max-width:70vw;

  display:block;
  margin:0 auto 20px auto;

  filter:drop-shadow(0 0 20px #ffb300);

  animation:logoFloat 4s infinite ease-in-out;
}
@keyframes logoFloat {

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-8px);
  }
}
</style>
</head>

<body>

<div class="container">

<img
  src="bibipero_logo.png"
  class="main-logo"
  alt="BIBIPERO"
>

<div class="subtitle">
Le jeu d'apéro connecté 🍻
</div>

<div class="menu">

<a class="tv" href="/tv.html">
📺 Ouvrir la TV
</a>

<a class="join" href="/join.html">
👥 Rejoindre une partie
</a>

<a class="qr" href="/qr.html">
🖨️ Imprimer les QR
</a>

<a class="app" href="/app.html">
📱 Application BIBIPERO
</a>

<a class="rules" href="/rules.html">
📖 Règles du jeu
</a>

</div>

<div class="version">
BIBIPERO v1.0 • 📱 Application • 🌍 Web • 📺 TV
</div>

</div>

</body>
</html>
