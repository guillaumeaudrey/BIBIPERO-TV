<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>BIBIPERO - Rejoindre</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: #1d1d1d;
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255,180,0,0.3);
    }

    h1 {
      color: #ffb300;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      border: none;
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      border: none;
      background: #ffb300;
      color: black;
      font-size: 20px;
      font-weight: bold;
      margin-top: 15px;
    }

    .start-btn {
      background: #4caf50;
      color: white;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #success {
      margin-top: 15px;
      color: #4cff88;
      font-size: 18px;
    }

    #masterInfo {
      margin-top: 15px;
      font-size: 18px;
      color: #ffb300;
      font-weight: bold;
    }

    .waiting-message {
      margin-top: 18px;
      padding: 14px;
      border-radius: 15px;
      background: rgba(255,179,0,0.12);
      color: #ffb300;
      font-size: 18px;
      font-weight: bold;
    }

    .players-box {
      margin-top: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 15px;
      text-align: left;
    }

    .players-box h2 {
      color: #ffb300;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #playersList {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #playersList li {
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.08);
    }

    #scanResult {
      margin-top: 15px;
      font-size: 17px;
    }

    .back-btn {
  display: block;
  margin-top: 18px;
  padding: 14px;
  border-radius: 14px;
  background: #333;
  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
}

.new-game-btn {
  background: #d32f2f;
  color: white;
}

.room-code{
  margin-top:10px;
  margin-bottom:20px;

  font-size:22px;
  font-weight:bold;

  color:#ffb300;
}

.input-group {
  text-align: left;
  margin-bottom: 18px;
}

.input-group label {
  display: block;
  color: #ffb300;
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 16px;
}

.input-group input {
  margin-bottom: 0;
}

.invite-btn {
  background: #1565c0;
  color: white;
}

  </style>
</head>

<body>

  <div class="card">

    <h1>🍻 Rejoindre BIBIPERO</h1>

    <div id="roomCodeDisplay" class="room-code" style="display:none;">
  🎟️ Salon : ----
</div>

    <div class="input-group">
  <label>👤 Ton prénom</label>

  <input
    id="playerName"
    placeholder="Ex : Guillaume"
  />
</div>

<div id="joinSection" style="display:none;">

  <div class="input-group">
    <label>🎟️ Code salon</label>

    <input
      id="roomInput"
      placeholder="Ex : BIBINE-42"
      maxlength="12"
    />
  </div>

</div>

    <button onclick="createGame()">
    🍻 Créer une partie
    </button>

    <button onclick="showJoinMode()" class="secondary-btn" id="showJoinBtn">
  🎟️ Rejoindre une partie
</button>

<button onclick="joinGame()" class="start-btn" id="joinRoomBtn" style="display:none;">
  ✅ Entrer dans le salon
</button>

    <div id="success"></div>

    <button
  id="inviteBtn"
  class="invite-btn"
  onclick="copyInviteLink()"
  style="display:none;"
>
  📋 Copier le lien d'invitation
</button>

    <div id="masterInfo">
      👑 Maître : -
    </div>

    <div id="waitingMessage" class="waiting-message">
      🍻 Les verres sont prêts... On attend le maître de l'apéro !
    </div>

    <div class="players-box">
      <h2>👥 Joueurs connectés</h2>
      <ul id="playersList"></ul>
    </div>

    <div id="masterControls">
      <button id="startBtn" class="start-btn" onclick="startGame()">
        ▶ Démarrer la partie
      </button>

      <button id="newGameBtn" class="new-game-btn" onclick="resetWebGame()">
  🔄 Nouvelle partie
</button>

    </div>

    <div id="scanResult"></div>

<a class="back-btn" href="/">
  ⬅ Retour accueil
</a>
 <button onclick="disconnectPlayer()" class="new-game-btn">
🚪 Quitter le joueur
</button>
  </div>

  <script>
    const socket = io();

    let isMaster = false;
    let currentRoomCode = "";

    const waitingMessages = [
      "🍻 Les verres sont prêts... On attend le maître de l'apéro !",
      "🍺 Échauffement en cours... Le maître prépare une catastrophe.",
      "🎉 La soirée charge à 99%... Plus qu'à appuyer sur Démarrer !",
      "🤫 Ne réveillez pas le maître, il réfléchit encore.",
      "👑 Le roi du BIBIPERO n'a pas encore donné le signal.",
      "🍹 Vérification des stocks d'apéro en cours...",
      "🎲 Le destin des joueurs est en train de se charger...",
      "🍻 Rassemblement des légendes de l'apéro...",
      "⚠️ Niveau de folie insuffisant. En attente du maître.",
      "🚀 Préparation au décollage alcoolisé..."
    ];

    function updateWaitingMessage() {
      const randomMessage =
        waitingMessages[
          Math.floor(Math.random() * waitingMessages.length)
        ];

      document.getElementById("waitingMessage").textContent =
        randomMessage;
    }

    socket.on("stateUpdated", (data) => {

    if (data.roomCode) {
  currentRoomCode = data.roomCode;

  document.getElementById("roomCodeDisplay").textContent =
    `🎟️ Salon : ${data.roomCode}`;
}

      if (data.gameStarted) {
        window.location.href = "/play.html";
      }
    });

    socket.on("playersUpdated", (players) => {
      const list = document.getElementById("playersList");
      list.innerHTML = "";

      const myName =
        localStorage.getItem("bibiperoPlayer");

      isMaster = false;
      let masterName = "";

      players.forEach(p => {
        if (p.isMaster) {
          masterName = p.name;
        }

        if (p.name === myName && p.isMaster) {
          isMaster = true;
        }

        const li =
          document.createElement("li");

        li.textContent =
          `${p.isMaster ? "👑" : "👤"} ${p.name} — Case ${p.position || 0}`;

        list.appendChild(li);
      });

      document.getElementById("masterInfo").textContent =
        `👑 Maître : ${masterName || "-"}`;

      document.getElementById("masterControls").style.display =
        isMaster ? "block" : "none";
    });

    socket.on("masterOnly", () => {
      document.getElementById("scanResult").textContent =
        "⛔ Seul le joueur maître peut faire ça";
    });

    socket.on("startError", (data) => {
      document.getElementById("scanResult").textContent =
        `⛔ ${data.message}`;
    });

  

    function joinGame() {

  if (localStorage.getItem("bibiperoPlayer")) {
    document.getElementById("success").textContent =
      "⚠️ Ce téléphone est déjà connecté avec un joueur.";
    return;
  }

  const playerName =
    document.getElementById("playerName").value.trim();

  const roomInput =
    document.getElementById("roomInput")
      .value
      .trim()
      .toUpperCase();

  if (!playerName) return;

  if (roomInput !== currentRoomCode) {
    document.getElementById("success").textContent =
      "⛔ Mauvais code salon";
    return;
  }

  localStorage.setItem("bibiperoPlayer", playerName);

  socket.emit("joinPlayer", {
    playerName: playerName,
    roomCode: roomInput
  });

  document.getElementById("success").textContent =
    `✅ ${playerName} a rejoint la partie`;

  updateWaitingMessage();
}

    function startGame() {
      const playersCount =
        document.querySelectorAll("#playersList li").length;

      if (playersCount < 2) {
        document.getElementById("scanResult").textContent =
          "⛔ Il faut au moins 2 joueurs pour démarrer";
        return;
      }

      socket.emit("startGame");

      document.getElementById("scanResult").textContent =
        "▶ Partie démarrée";
    }

    updateWaitingMessage();

    setInterval(updateWaitingMessage, 10000);


    socket.emit("getState");

    socket.on("gameReset", () => {

  localStorage.removeItem("bibiperoPlayer");
  localStorage.removeItem("bibiperoJoined");

  window.location.href = "/join.html";
});

function resetWebGame() {
  socket.emit("resetGame");
}
    window.addEventListener("load", () => {

  const savedName =
    localStorage.getItem("bibiperoPlayer");

  if (savedName) {
    document.getElementById("playerName").value = savedName;

    socket.emit("joinPlayer", {
  playerName: savedName,
  roomCode: currentRoomCode
});

    document.getElementById("success").textContent =
      `✅ ${savedName} est reconnecté`;
  }

  socket.emit("getState");
});

socket.on("joinError", (data) => {
  document.getElementById("success").textContent =
    `⛔ ${data.message}`;
});

function disconnectPlayer() {

  localStorage.removeItem("bibiperoPlayer");
  localStorage.removeItem("bibiperoJoined");

  location.reload();
}

function showJoinMode() {
  document.getElementById("joinSection").style.display = "block";
  document.getElementById("joinRoomBtn").style.display = "block";
  document.getElementById("showJoinBtn").style.display = "none";
}

function createGame() {

  const playerName =
    document.getElementById("playerName").value.trim();

  if (!playerName) {
    document.getElementById("success").textContent =
      "⛔ Entre ton prénom d'abord";
    return;
  }

  socket.emit("createRoom", {
    playerName: playerName
  });

}

socket.on("roomCreated", (data) => {

  currentRoomCode = data.roomCode;

  localStorage.setItem("bibiperoPlayer", data.playerName);

  document.getElementById("roomCodeDisplay").textContent =
    `🎟️ Salon : ${data.roomCode}`;

  document.getElementById("success").textContent =
    `✅ Partie créée ! Code : ${data.roomCode}`;

  document.getElementById("roomCodeDisplay").style.display = "block";
document.getElementById("roomCodeDisplay").textContent =
  `🎟️ Salon : ${data.roomCode}`;  

  document.getElementById("inviteBtn").style.display = "block";

});

function copyInviteLink() {

  const inviteLink =
    `${window.location.origin}/join.html?room=${currentRoomCode}`;

  navigator.clipboard.writeText(inviteLink);

  document.getElementById("success").textContent =
    "✅ Lien d'invitation copié !";
}



  </script>

</body>
</html>
