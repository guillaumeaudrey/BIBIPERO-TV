<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>BIBIPERO - Rejoindre</title>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    :root {
      --bg: #090909;
      --card: #191919;
      --panel: rgba(255,255,255,.075);
      --panel-strong: rgba(255,179,0,.11);
      --gold: #ffb300;
      --gold-light: #ffcc4d;
      --gold-dark: #d18a00;
      --green: #4caf50;
      --blue: #226bc8;
      --red: #d72835;
      --text-soft: #d8d8d8;
      --border: rgba(255,255,255,.12);
      --gold-border: rgba(255,179,0,.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      color: white;
      font-family: Arial, sans-serif;

      background:
        radial-gradient(circle at top, rgba(255,179,0,.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(128,0,255,.10), transparent 35%),
        linear-gradient(180deg,#101010,#060606);
    }

    .card {
      width: 100%;
      max-width: 500px;
      padding: 24px;

      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),
        var(--card);

      border: 1px solid rgba(255,255,255,.10);
      border-radius: 32px;

      text-align: center;

      box-shadow:
        0 0 38px rgba(255,179,0,.18),
        0 28px 80px rgba(0,0,0,.55);
    }

    .top-logo {
      font-size: 32px;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 18px rgba(255,179,0,.30);
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--text-soft);
      font-size: 15px;
      margin-bottom: 18px;
    }

    .room-code {
  display: none;
  margin: 0 0 18px;
  padding: 16px 18px;

  border-radius: 22px;

  background:
    linear-gradient(
      180deg,
      rgba(255,179,0,.16),
      rgba(255,179,0,.07)
    );

  border: 1px solid var(--gold-border);

  color: var(--gold);
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 1px;

  text-align: center;

  box-shadow:
    0 0 22px rgba(255,179,0,.12);

  text-transform: uppercase;

  animation: roomGlow 2s infinite alternate;
}

    .section {
      margin-top: 16px;
      padding: 18px;

      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;

      text-align: left;
    }

    .section.gold {
      background:
        linear-gradient(180deg, rgba(255,179,0,.13), rgba(255,179,0,.04));
      border-color: var(--gold-border);
    }

    .section-title {
      color: var(--gold);
      font-weight: 900;
      font-size: 19px;
      margin-bottom: 14px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 14px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;

      color: var(--gold);
      font-weight: 900;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 15px;

      border: none;
      border-radius: 18px;

      background: white;
      color: #111;

      font-size: 20px;
      text-align: center;

      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 3px rgba(255,179,0,.35);
    }

    input[readonly] {
      background: #ececec;
      color: #555;
    }

    button,
    .fake-button {
      width: 100%;
      min-height: 58px;
      margin-top: 12px;
      padding: 0 18px;

      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 10px;

      border: none;
      border-radius: 18px;

      color: white;
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
      text-align: left;

      cursor: pointer;
      transition: .2s;

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        0 12px 26px rgba(0,0,0,.32);
    }

    button:hover,
    .fake-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .btn-icon {
      text-align: center;
      font-size: 22px;
    }

    .primary-btn {
      background: linear-gradient(135deg,#e09a00,#ffbf24);
      color: #111;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.25),
        0 0 26px rgba(255,179,0,.28),
        0 12px 26px rgba(0,0,0,.32);
    }

    .start-btn {
      background: linear-gradient(135deg,#45b85a,#278238);
    }

    .invite-btn {

  background:
    linear-gradient(
      135deg,
      #1f1f1f,
      #343434
    );

  border:
    1px solid rgba(255,179,0,.25);

  color:white;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    0 0 12px rgba(255,179,0,.10),
    0 12px 26px rgba(0,0,0,.32);
}
.invite-btn:hover{

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    0 0 20px rgba(255,179,0,.20),
    0 12px 26px rgba(0,0,0,.32);
}

    .new-game-btn {
      background: linear-gradient(135deg,#de2a38,#a81722);
    }

    .dark-btn {
      background:
        linear-gradient(135deg,#242424,#343434);
      border: 1px solid rgba(255,179,0,.18);
    }

    .mini-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    #success,
    #scanResult {
      margin-top: 14px;
      min-height: 22px;

      color: #4cff88;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }

    #masterInfo {
      margin-bottom: 12px;

      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
      text-align: center;
    }

    .waiting-message {
      margin: 12px 0 14px;
      padding: 13px;

      border-radius: 16px;

      background: var(--panel-strong);

      color: var(--gold);
      font-size: 16px;
      font-weight: 900;
      text-align: center;
    }

    #playersList {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #playersList li {

  padding: 14px 16px;

  border-radius: 16px;

  margin-bottom: 10px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.03)
    );

  border-left: 4px solid #ffb300;

  font-size: 17px;

  transition:.2s;
}

#playersList li:hover{
  transform:translateX(4px);
}

    .bottom-actions {
      margin-top: 18px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 18px;
        border-radius: 28px;
      }

      .top-logo {
        font-size: 29px;
      }

      .section {
        padding: 16px;
      }

      .room-code {
        font-size: 23px;
      }

      button,
      .fake-button {
        min-height: 55px;
        font-size: 17px;
      }
    }

    #createGameBtn{
  margin-top:22px;
}
#showJoinBtn{

  background:
    linear-gradient(
      135deg,
      #1f1f1f,
      #343434
    )!important;

  border:
    1px solid rgba(255,179,0,.25);

  color:white;
}

.join-tagline{
  color:#ffb300;
  font-size:18px;
  font-weight:700;
  text-align:center;
  margin-top:6px;
  margin-bottom:18px;
  text-shadow:0 0 12px rgba(255,179,0,.25);
}

.players-header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:12px;
}

#playerCount{
  color:#ddd;
  font-size:15px;
  font-weight:600;
}

.master-actions-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.small-action-btn{
  padding:14px 10px;
  font-size:16px;
}

.main-start-btn{
  margin-top:0;
}

.home-link{
  display:block;
  text-align:center;
  margin-top:14px;

  color:#bbb;
  text-decoration:none;

  font-size:15px;
  font-weight:600;

  transition:.2s;
}

.home-link:hover{
  color:#ffb300;
}



  </style>
</head>

<body>
  <div class="card">

    <div class="top-logo">🍻 BIBIPERO</div>

    <div class="subtitle">
      Crée ou rejoins un salon d’apéro connecté
    </div>

    <div class="join-tagline">
      👑 Entre dans l'arène BIBIPERO
    </div>

    <div id="roomCodeDisplay" class="room-code">
      🎟️ Salon : ----
    </div>

    <div class="section" id="identitySection">
      <div class="section-title">👤 Joueur</div>

      <div class="input-group">
        <label>Ton prénom</label>
        <input id="playerName" placeholder="Ex : Guillaume" />
      </div>

      <div id="joinSection" style="display:none;">
        <div class="input-group">
          <label>Code salon</label>
          <input id="roomInput" placeholder="Ex : BIBINE-42" maxlength="12" />
        </div>
      </div>

      <button id="createGameBtn" class="primary-btn" onclick="createGame()">
        <span class="btn-icon">🍻</span>
        <span>Créer une partie</span>
      </button>

      <button id="showJoinBtn" class="dark-btn" onclick="showJoinMode()">
        <span class="btn-icon">🎟️</span>
        <span>Rejoindre une partie</span>
      </button>

      <button id="joinRoomBtn" class="start-btn" onclick="joinGame()" style="display:none;">
        <span class="btn-icon">✅</span>
        <span>Rejoindre le salon</span>
      </button>

      <button id="cancelJoinBtn"
        class="dark-btn"
        onclick="cancelJoinMode()"
        style="display:none;">
  <span class="btn-icon">⬅</span>
  <span>Retour</span>
</button>
      <button id="openTvPlayerBtn"
  class="invite-btn"
  onclick="openTvRoom()"
  style="display:none;">
  <span class="btn-icon">📺</span>
  <span>Ouvrir la TV</span>
</button>

      <div id="success"></div>
    </div>

    <div class="section gold" id="masterPanel" style="display:none;">
  <div class="section-title">👑 Maître du salon</div>

  <div class="master-actions-grid">

    <button
      id="openTvBtn"
      class="invite-btn small-action-btn"
      onclick="openTvRoom()"
      style="display:none;"
    >
      <span class="btn-icon">📺</span>
      <span>TV</span>
    </button>

    <button
      id="inviteBtn"
      class="invite-btn small-action-btn"
      onclick="copyInviteLink()"
      style="display:none;"
    >
      <span class="btn-icon">📋</span>
      <span>Inviter</span>
    </button>

  </div>

  <div id="masterControls" style="display:none;">

    <button id="startBtn" class="start-btn main-start-btn" onclick="startGame()">
      <span class="btn-icon">▶</span>
      <span>Démarrer la partie</span>
    </button>

    <button id="newGameBtn" class="new-game-btn" onclick="resetWebGame()">
      <span class="btn-icon">🔄</span>
      <span>Nouvelle partie</span>
    </button>

  </div>
</div>

    <div class="section">
      <div class="section-title">👥 Joueurs connectés</div>

      <div class="players-header">

  <div id="masterInfo">
    👑 Maître : -
  </div>

  <div id="playerCount">
    👥 0 joueur
  </div>

</div>

<div id="waitingMessage" class="waiting-message">
  🍻 Les verres sont prêts... On attend le maître de l'apéro !
</div>

<ul id="playersList"></ul>
    </div>

    <div id="scanResult"></div>

    <div class="bottom-actions">
      <button onclick="disconnectPlayer()" class="new-game-btn">
        <span class="btn-icon">🚪</span>
        <span>Quitter le joueur</span>
      </button>

      <div class="bottom-nav">

  <a class="fake-button dark-btn" href="/">
    <span class="btn-icon">🏠</span>
    <span>Accueil</span>
  </a>

</div>
    </div>
  </div>

  <script>
    const socket = io();

    let isMaster = false;
    let currentRoomCode = "";

    const waitingMessages = [
      "🍻 Les verres sont prêts... On attend le maître de l'apéro !",
      "🍺 Échauffement en cours... Le maître prépare une catastrophe.",
      "🎉 La soirée charge à 99%... Plus qu'à appuyer sur Démarrer !",
      "🤫 Ne réveillez pas le maître, il réfléchit encore.",
      "👑 Le roi du BIBIPERO n'a pas encore donné le signal.",
      "🍹 Vérification des stocks d'apéro en cours...",
      "🎲 Le destin des joueurs est en train de se charger...",
      "🍻 Rassemblement des légendes de l'apéro...",
      "⚠️ Niveau de folie insuffisant. En attente du maître.",
      "🚀 Préparation au décollage alcoolisé..."
    ];

    function updateWaitingMessage() {
      const randomMessage =
        waitingMessages[Math.floor(Math.random() * waitingMessages.length)];

      document.getElementById("waitingMessage").textContent = randomMessage;
    }

    function showRoomCode(roomCode) {
      if (!roomCode) return;

      currentRoomCode = roomCode.toUpperCase();
      localStorage.setItem("bibiperoRoomCode", currentRoomCode);

      const display = document.getElementById("roomCodeDisplay");
      display.textContent = `🎟️ Salon : ${currentRoomCode}`;
      display.style.display = "block";

    const tagline =
   document.querySelector(".join-tagline");

    if (tagline) {
     tagline.style.display = "none";
    }

    }

    function showMasterButtons() {
      document.getElementById("masterPanel").style.display = "block";
      document.getElementById("inviteBtn").style.display = "grid";
      document.getElementById("openTvBtn").style.display = "grid";
    }

    function hideMasterButtons() {
      document.getElementById("masterPanel").style.display = "none";
      document.getElementById("inviteBtn").style.display = "none";
      document.getElementById("openTvBtn").style.display = "none";
      document.getElementById("masterControls").style.display = "none";
    }

    socket.on("stateUpdated", (data) => {
      if (data.roomCode) {
        showRoomCode(data.roomCode);
      }

      const joinedName = localStorage.getItem("bibiperoPlayer") || "";
      const joinedRoom = localStorage.getItem("bibiperoRoomCode") || "";

      if (
        data.gameStarted &&
        joinedName &&
        joinedRoom &&
        (data.roomCode || currentRoomCode)
      ) {
        window.location.href =
          `/play.html?room=${data.roomCode || currentRoomCode}`;
      }
    });

    socket.on("playersUpdated", (players) => {
      const list = document.getElementById("playersList");
      list.innerHTML = "";

      if (players.length === 0) {

  list.innerHTML = `
    <li style="
      text-align:center;
      opacity:.8;
      padding:20px;
    ">
      🍻 Aucun joueur connecté
      <br><br>
      Invite tes amis avec le lien du salon.
    </li>
  `;

  return;
}

      const myName = localStorage.getItem("bibiperoPlayer") || "";

      isMaster = false;
      let masterName = "";

      document.getElementById("playerCount").textContent =
  `👥 ${players.length} joueur${players.length > 1 ? "s" : ""}`;

      players.forEach(p => {
        if (p.isMaster) {
          masterName = p.name;
        }

        if (
          p.name.trim().toLowerCase() === myName.trim().toLowerCase() &&
          p.isMaster
        ) {
          isMaster = true;
        }

        const li = document.createElement("li");
        li.textContent =
          `${p.isMaster ? "👑" : "👤"} ${p.name} — Case ${p.position || 0}`;

        list.appendChild(li);
      });

      document.getElementById("masterInfo").textContent =
        `👑 Maître : ${masterName || "-"}`;

      if (isMaster) {
        showMasterButtons();
      }

      document.getElementById("masterControls").style.display =
        isMaster ? "block" : "none";
    });

    socket.on("masterOnly", () => {
      document.getElementById("scanResult").textContent =
        "⛔ Seul le joueur maître peut faire ça";
    });

    socket.on("startError", (data) => {
      document.getElementById("scanResult").textContent =
        `⛔ ${data.message}`;
    });

    socket.on("joinError", (data) => {
      const joinBtn = document.getElementById("joinRoomBtn");
      joinBtn.disabled = false;
      joinBtn.style.display = "grid";
      joinBtn.textContent = "✅ Entrer dans le salon";

      document.getElementById("success").textContent =
        `⛔ ${data.message}`;
    });

    socket.on("joinSuccess", (data) => {
      localStorage.setItem("bibiperoPlayer", data.playerName);
      localStorage.setItem("bibiperoRoomCode", data.roomCode);
      localStorage.setItem("bibiperoJoined", "true");

      showRoomCode(data.roomCode);

      const joinBtn = document.getElementById("joinRoomBtn");
      joinBtn.disabled = true;
      joinBtn.innerHTML =
        `<span class="btn-icon">✅</span><span>Salon rejoint</span>`;

      document.getElementById("success").textContent =
        `✅ ${data.playerName} a rejoint la partie`;
        document.getElementById("openTvPlayerBtn").style.display = "grid";
    });

    socket.on("playerJoined", (data) => {

  const myName =
    localStorage.getItem("bibiperoPlayer");

  if (myName && data.playerName !== myName) {

    const success =
      document.getElementById("success");

    success.textContent =
      `🎉 ${data.playerName} a rejoint le salon`;

    setTimeout(() => {
      success.textContent = "";
    }, 3000);
  }

});

    socket.on("gameReset", () => {
      localStorage.removeItem("bibiperoPlayer");
      localStorage.removeItem("bibiperoJoined");
      localStorage.removeItem("bibiperoRoomCode");

      window.location.href = "/join.html";
    });

    function createGame() {
      const playerName =
        document.getElementById("playerName").value.trim();

      if (!playerName) {
        document.getElementById("success").textContent =
          "⛔ Entre ton prénom d'abord";
        return;
      }

      socket.emit("createRoom", {
        playerName: playerName
      });
    }

    socket.on("roomCreated", (data) => {
      currentRoomCode = data.roomCode;

      localStorage.setItem("bibiperoPlayer", data.playerName);
      localStorage.setItem("bibiperoRoomCode", data.roomCode);
      localStorage.setItem("bibiperoJoined", "true");

      showRoomCode(data.roomCode);
      showMasterButtons();

      document.getElementById("createGameBtn").style.display = "none";
      document.getElementById("showJoinBtn").style.display = "none";
      document.getElementById("joinSection").style.display = "none";
      document.getElementById("joinRoomBtn").style.display = "none";

      document.getElementById("success").textContent =
        `✅ Partie créée ! Code : ${data.roomCode}`;

      setTimeout(() => {
        socket.emit("getState", { roomCode: currentRoomCode });
      }, 200);
    });

    function showJoinMode() {

  document.getElementById("joinSection").style.display = "block";

  document.getElementById("joinRoomBtn").style.display = "grid";

  document.getElementById("showJoinBtn").style.display = "none";

  document.getElementById("createGameBtn").style.display = "none";

  document.getElementById("cancelJoinBtn").style.display = "grid";

}
function cancelJoinMode() {

  document.getElementById("joinSection").style.display = "none";

  document.getElementById("joinRoomBtn").style.display = "none";

  document.getElementById("cancelJoinBtn").style.display = "none";

  document.getElementById("showJoinBtn").style.display = "grid";

  document.getElementById("createGameBtn").style.display = "grid";

}


    function joinGame() {
      const playerName =
        document.getElementById("playerName").value.trim();

      const roomInput =
        document.getElementById("roomInput")
          .value
          .trim()
          .toUpperCase();

      if (!playerName) {
        document.getElementById("success").textContent =
          "⛔ Entre ton prénom";
        return;
      }

      if (!roomInput) {
        document.getElementById("success").textContent =
          "⛔ Code salon manquant";
        return;
      }

      currentRoomCode = roomInput;
      localStorage.setItem("bibiperoRoomCode", currentRoomCode);

      const joinBtn = document.getElementById("joinRoomBtn");
      joinBtn.disabled = true;
      joinBtn.innerHTML =
        `<span class="btn-icon">⏳</span><span>Connexion...</span>`;

      socket.emit("joinPlayer", {
        playerName: playerName,
        roomCode: roomInput
      });

      document.getElementById("success").textContent =
        "⏳ Connexion au salon...";

      updateWaitingMessage();
    }

    function startGame() {
      const playersCount =
        document.querySelectorAll("#playersList li").length;

      if (playersCount < 2) {
        document.getElementById("scanResult").textContent =
          "⛔ Il faut au moins 2 joueurs pour démarrer";
        return;
      }

      socket.emit("startGame", {
        roomCode: currentRoomCode
      });

      document.getElementById("scanResult").textContent =
        "▶ Partie démarrée";
    }

    function resetWebGame() {
      socket.emit("resetGame", {
        roomCode:
          currentRoomCode ||
          localStorage.getItem("bibiperoRoomCode") ||
          ""
      });
    }

    function copyInviteLink() {
      const code =
        currentRoomCode ||
        localStorage.getItem("bibiperoRoomCode") ||
        "";

      if (!code) {
        document.getElementById("success").textContent =
          "⛔ Crée d'abord une partie";
        return;
      }

      const inviteLink =
        `${window.location.origin}/join.html?room=${code}`;

      navigator.clipboard.writeText(inviteLink);

      document.getElementById("success").textContent =
        "✅ Lien d'invitation copié !";
    }

    function openTvRoom() {
      const code =
        currentRoomCode ||
        localStorage.getItem("bibiperoRoomCode") ||
        "";

      if (!code) {
        document.getElementById("success").textContent =
          "⛔ Crée d'abord une partie";
        return;
      }

      window.open(
        `${window.location.origin}/tv.html?room=${code}`,
        "_blank"
      );
    }

    function disconnectPlayer() {
      localStorage.removeItem("bibiperoPlayer");
      localStorage.removeItem("bibiperoJoined");
      localStorage.removeItem("bibiperoRoomCode");

      window.location.href = "/join.html";
    }

    function initPage() {
      updateWaitingMessage();
      setInterval(updateWaitingMessage, 10000);

      const params = new URLSearchParams(window.location.search);
      const roomFromLink = params.get("room");

      if (roomFromLink) {
        currentRoomCode = roomFromLink.toUpperCase();

        localStorage.setItem("bibiperoRoomCode", currentRoomCode);
        localStorage.removeItem("bibiperoPlayer");
        localStorage.removeItem("bibiperoJoined");

        showRoomCode(currentRoomCode);

        document.getElementById("openTvPlayerBtn").style.display = "grid";

        document.getElementById("joinSection").style.display = "block";
        document.getElementById("roomInput").value = currentRoomCode;
        document.getElementById("roomInput").readOnly = true;

        document.getElementById("playerName").value = "";
        document.getElementById("createGameBtn").style.display = "none";
        document.getElementById("showJoinBtn").style.display = "none";
        document.getElementById("joinRoomBtn").style.display = "grid";

        document.getElementById("success").textContent =
          "🎟️ Code salon reçu, entre ton prénom";

        socket.emit("getState", { roomCode: currentRoomCode });
        return;
      }

      const savedName =
        localStorage.getItem("bibiperoPlayer");

      const savedRoom =
        localStorage.getItem("bibiperoRoomCode");

      if (savedName && savedRoom) {
        currentRoomCode = savedRoom.toUpperCase();

        document.getElementById("playerName").value = savedName;
        showRoomCode(currentRoomCode);
        document.getElementById("openTvPlayerBtn").style.display = "grid";

        socket.emit("joinPlayer", {
          playerName: savedName,
          roomCode: currentRoomCode
        });

        document.getElementById("success").textContent =
          `✅ ${savedName} est reconnecté`;

        setTimeout(() => {
          socket.emit("getState", { roomCode: currentRoomCode });
        }, 300);

        return;
      }

      socket.emit("getState", { roomCode: "" });
    }

    window.addEventListener("load", initPage);
  </script>
</body>
</html>
