<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>BIBIPERO - Jouer</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: #1d1d1d;
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255,180,0,0.3);
    }

    h1 {
      color: #ffb300;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      border: none;
      font-size: 20px;
      font-weight: bold;
      margin-top: 15px;
    }

    .scan-btn {
      background: #4caf50;
      color: white;
    }

    .next-btn {
      background: #2196f3;
      color: white;
    }

    .reset-btn {
      background: #d32f2f;
      color: white;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #masterInfo,
    #turnInfo,
    #scanResult {
      margin-top: 15px;
      font-size: 18px;
    }

    #turnInfo {
      color: #ffb300;
      font-weight: bold;
    }

    .active-turn {
      box-shadow: 0 0 25px #4caf50;
      border: 3px solid #4caf50;
    }

    .inactive-turn {
      opacity: 0.65;
    }

    .players-box {
      margin-top: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 15px;
      text-align: left;
    }

    .players-box h2 {
      color: #ffb300;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #playersList {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #playersList li {
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.08);
    }

    #reader {
      display: none;
      width: 100%;
      margin-top: 20px;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <div class="card" id="mainCard">

    <h1>🎮 BIBIPERO</h1>

    <div id="masterInfo">
      👑 Maître : -
    </div>

    <div id="turnInfo">
      🎮 Tour de : -
    </div>

    <div class="players-box">
      <h2>👥 Joueurs</h2>
      <ul id="playersList"></ul>
    </div>

    <button id="scanBtn" class="scan-btn" onclick="openScanner()">
      📷 Scanner ma case
    </button>

    <div id="scanResult"></div>
    <div id="reader"></div>

    <button id="nextBtn" class="next-btn" onclick="nextPlayer()">
      ✅ Fin de mon tour
    </button>

    <button id="resetBtn" class="reset-btn" onclick="resetGame()">
      🔄 Nouvelle partie
    </button>

  </div>

  <script>
    const socket = io();

const params = new URLSearchParams(window.location.search);

const roomFromUrl = params.get("room");

const savedRoomCode =
  (roomFromUrl ||
   localStorage.getItem("bibiperoRoomCode") ||
   "").toUpperCase();

if (savedRoomCode) {
  localStorage.setItem(
    "bibiperoRoomCode",
    savedRoomCode
  );
}

socket.emit("joinPlayerRoom", {
  roomCode: savedRoomCode
});

    const savedPlayer =
  localStorage.getItem("bibiperoPlayer");

if (!savedPlayer) {
  window.location.href = savedRoomCode ? `/join.html?room=${savedRoomCode}` : "/join.html";
}
socket.emit("rejoinPlayer", { playerName: savedPlayer, roomCode: savedRoomCode });

    let currentPlayer = "";
    let gameStarted = false;
    let isMaster = false;
    let html5QrCode;

    socket.on("stateUpdated", (data) => {

      if (!data.gameStarted) {
        window.location.href = savedRoomCode ? `/join.html?room=${savedRoomCode}` : "/join.html";
        return;
      }

      currentPlayer = data.currentPlayer || "";
      gameStarted = data.gameStarted || false;

      const myName =
        localStorage.getItem("bibiperoPlayer");

      const isMyTurn =
        myName === currentPlayer;

      document.getElementById("turnInfo").textContent =
        `🎮 Tour de : ${currentPlayer}`;

      document.getElementById("scanBtn").disabled =
        !gameStarted || !isMyTurn;

      document.getElementById("nextBtn").disabled =
        !gameStarted || !isMyTurn;

      const card =
        document.getElementById("mainCard");

      if (isMyTurn) {
        card.classList.remove("inactive-turn");
        card.classList.add("active-turn");
      } else {
        card.classList.remove("active-turn");
        card.classList.add("inactive-turn");
      }
      if (!isMyTurn) {
  document.getElementById("scanResult").textContent =
    `⏳ En attente de ${currentPlayer}`;
}
    });

    socket.on("playersUpdated", (players) => {

      const list =
        document.getElementById("playersList");

      list.innerHTML = "";

      const myName =
        localStorage.getItem("bibiperoPlayer");

      isMaster = false;
      let masterName = "";

      players.forEach(p => {

        if (p.isMaster) {
          masterName = p.name;
        }

        if (p.name === myName && p.isMaster) {
          isMaster = true;
        }

        const li =
          document.createElement("li");

        li.textContent =
          `${p.isMaster ? "👑" : "👤"} ${p.name} — Case ${p.position || 0}`;

        list.appendChild(li);
      });

      document.getElementById("masterInfo").textContent =
        `👑 Maître : ${masterName || "-"}`;

      document.getElementById("resetBtn").style.display =
        isMaster ? "block" : "none";
    });

    socket.on("notYourTurn", (data) => {
      document.getElementById("scanResult").textContent =
        `⛔ Ce n'est pas ton tour. C'est le tour de ${data.currentPlayer}`;
    });

    socket.on("masterOnly", () => {
      document.getElementById("scanResult").textContent =
        "⛔ Seul le joueur maître peut faire ça";
    });

    socket.on("scanError", (data) => {
      document.getElementById("scanResult").textContent =
        `⛔ ${data.message}`;
    });

    async function openScanner() {

  const myName =
    localStorage.getItem("bibiperoPlayer");

    console.log(
    "Mon nom :",
    myName,
    "Tour actuel :",
    currentPlayer
  );

  if (!gameStarted) {
    document.getElementById("scanResult").textContent =
      "⛔ La partie n'a pas encore démarré";
    return;
  }

  if (currentPlayer && myName !== currentPlayer) {
    document.getElementById("scanResult").textContent =
      `⛔ Ce n'est pas ton tour. C'est le tour de ${currentPlayer}`;
    return;
  }

  const reader =
    document.getElementById("reader");

  reader.style.display = "block";

  document.getElementById("scanResult").textContent =
    "📷 Scanner ouvert";

  if (html5QrCode) {
    try {
      await html5QrCode.stop();
      await html5QrCode.clear();
    } catch (e) {}
  }

console.log("Ouverture caméra...");

  html5QrCode = new Html5Qrcode("reader");
  await html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: 250
  },
  (decodedText) => {

    document.getElementById("scanResult").textContent =
    "🎲 Action envoyée à la TV";

    socket.emit("playerScannedCase", {
  playerName: myName,
  qr: decodedText,
  roomCode: savedRoomCode
});

    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      reader.style.display = "none";
    });

  },
  () => {}
);
    }

    function nextPlayer() {

      if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
        html5QrCode = null;
      }

      const reader = document.getElementById("reader");
      if (reader) {
        reader.style.display = "none";
      }

      const myName =
        localStorage.getItem("bibiperoPlayer");

      if (currentPlayer && myName !== currentPlayer) {
        document.getElementById("scanResult").textContent =
          `⛔ Tu ne peux pas passer le tour. C'est le tour de ${currentPlayer}`;
        return;
      }

      socket.emit("nextPlayer", { roomCode: savedRoomCode });



document.getElementById("scanResult").textContent =
  "✅ Tour terminé";
    }

    function resetGame() {
      socket.emit("resetGame", { roomCode: savedRoomCode });

      document.getElementById("scanResult").textContent =
        "🔄 Nouvelle partie lancée";
    }

  socket.emit("getState", { roomCode: savedRoomCode });


  </script>

</body>
</html>
