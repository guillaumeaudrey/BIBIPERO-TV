<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>BIBIPERO - Jouer</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 460px;
      background: #1d1d1d;
      border-radius: 30px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255,180,0,0.3);
    }

    h1 {
      color: #ffb300;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 15px;
      border: none;
      font-size: 20px;
      font-weight: bold;
      margin-top: 15px;
    }

    .scan-btn {
      background:linear-gradient(135deg,#4caf50,#2e7d32);
      color: white;
    }

    .next-btn {
      background:linear-gradient(135deg,#42a5f5,#1976d2);
      color: white;
    }

    .reset-btn {
      background: #d32f2f;
      color: white;
    }
.new-round-btn{
  background:linear-gradient(135deg,#d18a00,#ffb300);
  color: white;
}
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #masterInfo,
    #turnInfo,
    #scanResult {
      margin-top: 15px;
      font-size: 18px;
    }

    #turnInfo{
  font-size: 24px;
  font-weight: 700;
  color: #ffb300;
  margin-top: 20px;
}

    .active-turn {
      box-shadow: 0 0 25px #4caf50;
      border: 3px solid #4caf50;
    }

    .inactive-turn {
      opacity: 0.65;
    }

    .players-box {
      margin-top: 20px;
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 15px;
      text-align: left;
    }

    .players-box h2 {
      color: #ffb300;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #playersList {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #playersList li {
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.08);
    }

    #reader {
      display: none;
      width: 100%;
      margin-top: 20px;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
    }

.action-popup{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.75);

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:9999;
}

.hidden{
  display:none;
}

.action-card{
  width:90%;
  max-width:420px;

  background:#1f1f1f;

  border:2px solid #ffb300;
  border-radius:20px;

  padding:25px;

  text-align:center;

  box-shadow:0 0 25px rgba(255,179,0,.5);
}

.action-emoji{
  font-size:60px;
}

.action-title{
  font-size:34px;
  font-weight:bold;
  color:#ffb300;
  margin-top:10px;
}

.action-text{
  margin-top:15px;
  font-size:22px;
  color:white;
}

#closeActionBtn{
  margin-top:25px;
  width:100%;
}

  </style>
</head>

<body>

  <div class="card" id="mainCard">

    <h1>🎮 BIBIPERO</h1>

    <div id="masterInfo">
      👑 Maître : -
    </div>

    <div id="turnInfo">
      🎮 Tour de : -
    </div>

    <div class="players-box">
      <h2>👥 Joueurs</h2>
      <ul id="playersList"></ul>
    </div>

    <button id="scanBtn" class="scan-btn" onclick="openScanner()">
      📷 Scanner ma case
    </button>

    <div id="scanResult"></div>
    <div id="reader"></div>

    <button id="nextBtn" class="next-btn" onclick="nextPlayer()">
      ✅ Fin de mon tour
    </button>

    <button id="newRoundBtn"
        class="new-round-btn"
        onclick="newRound()">
  🔄 Nouvelle manche
</button>

<button id="resetBtn"
        class="reset-btn"
        onclick="resetSalon()">
  🧹 Réinitialiser salon
</button>

  </div>

  <script>
    const socket = io();

const params = new URLSearchParams(window.location.search);

const roomFromUrl = params.get("room");

const savedRoomCode =
  (roomFromUrl ||
   localStorage.getItem("bibiperoRoomCode") ||
   "").toUpperCase();

if (savedRoomCode) {
  localStorage.setItem(
    "bibiperoRoomCode",
    savedRoomCode
  );
}

socket.emit("joinPlayerRoom", {
  roomCode: savedRoomCode
});

    const savedPlayer =
  localStorage.getItem("bibiperoPlayer");

if (!savedPlayer) {
  window.location.href = savedRoomCode ? `/join.html?room=${savedRoomCode}` : "/join.html";
}
socket.emit("rejoinPlayer", { playerName: savedPlayer, roomCode: savedRoomCode });

    let currentPlayer = "";
    let gameStarted = false;
    let isMaster = false;
    let html5QrCode;
    let lastActionId = "";

    socket.on("stateUpdated", (data) => {

      console.log("PLAY STATE =", data);

      if (!data.gameStarted) {

        if (data.isNewRound) {

          currentPlayer = data.currentPlayer || "";
          gameStarted = false;

          document.getElementById("turnInfo").textContent =
            "🔄 Nouvelle manche prête";

          document.getElementById("scanBtn").disabled = true;
          document.getElementById("nextBtn").disabled = true;

          document.getElementById("scanResult").textContent =
            "⏳ En attente du démarrage";

          return;
        }

        window.location.href =
          savedRoomCode
            ? `/join.html?room=${savedRoomCode}`
            : "/join.html";

        return;
      }

      currentPlayer = data.currentPlayer || "";
      gameStarted = true;

      const myName =
        localStorage.getItem("bibiperoPlayer");

      const isMyTurn =
        myName === currentPlayer;

        const actionId =
  `${data.playerName}-${data.caseNumber}-${data.title}-${data.totalActions}`;

if (
  data.playerName === myName &&
  data.title &&
  data.text &&
  actionId !== lastActionId
) {
  lastActionId = actionId;
  showActionPopup(data);
}

      document.getElementById("turnInfo").textContent =
        `🎮 Tour de : ${currentPlayer}`;

      document.getElementById("scanBtn").disabled =
        !gameStarted || !isMyTurn;

      document.getElementById("nextBtn").disabled =
        !gameStarted || !isMyTurn;

      const card =
        document.getElementById("mainCard");

      if (isMyTurn) {
        card.classList.remove("inactive-turn");
        card.classList.add("active-turn");
        document.getElementById("scanResult").textContent = "";
      } else {
        card.classList.remove("active-turn");
        card.classList.add("inactive-turn");
        document.getElementById("scanResult").textContent =
          `⏳ En attente de ${currentPlayer}`;
      }
    });

    socket.on("playersUpdated", (players) => {

      const list =
        document.getElementById("playersList");

      list.innerHTML = "";

      const myName =
        localStorage.getItem("bibiperoPlayer");

      isMaster = false;
      let masterName = "";

      players.forEach(p => {

        if (p.isMaster) {
          masterName = p.name;
        }

        if (p.name === myName && p.isMaster) {
          isMaster = true;
        }

        const li = document.createElement("li");

li.textContent =
 `${p.isMaster ? "👑" : "👤"} ${p.name} — Case ${p.position || 0}`;

if (p.name === currentPlayer) {
  li.style.border = "2px solid #4caf50";
  li.style.background = "rgba(76,175,80,0.2)";
}

list.appendChild(li);
      });

      document.getElementById("masterInfo").textContent =
        `👑 Maître : ${masterName || "-"}`;

      document.getElementById("newRoundBtn").style.display =
        isMaster ? "block" : "none";

      document.getElementById("resetBtn").style.display =
        isMaster ? "block" : "none";
    });

    socket.on("notYourTurn", (data) => {
      document.getElementById("scanResult").textContent =
        `⛔ Ce n'est pas ton tour. C'est le tour de ${data.currentPlayer}`;
    });

    socket.on("masterOnly", () => {
      document.getElementById("scanResult").textContent =
        "⛔ Seul le joueur maître peut faire ça";
    });

    socket.on("scanError", (data) => {
      document.getElementById("scanResult").textContent =
        `⛔ ${data.message}`;
    });

function getActionEmoji(category) {
  const icons = {
    "boire": "🍺",
    "malus": "💀",
    "bonus": "⭐",
    "de": "🎲",
    "relance": "🔄",
    "designation": "🎯",
    "gage-social": "🎭",
    "retour": "↩️",
    "devant-derriere": "🔀",
    "reveil": "⏰",
    "final-boire": "👑",
    "legendary": "👑"
  };

  return icons[category] || "🎲";
}

function showActionPopup(data) {
  if (!data.title || !data.text) return;

  const popup = document.getElementById("actionPopup");

  document.getElementById("actionEmoji").textContent =
    getActionEmoji(data.category);

  document.getElementById("actionTitle").textContent =
    data.title;

  document.getElementById("actionText").textContent =
    data.text;

  popup.classList.remove("hidden");
}

function closeActionPopup() {
  document.getElementById("actionPopup").classList.add("hidden");
}


    async function openScanner() {

  const myName =
    localStorage.getItem("bibiperoPlayer");

    console.log(
    "Mon nom :",
    myName,
    "Tour actuel :",
    currentPlayer
  );

  if (!gameStarted) {
    document.getElementById("scanResult").textContent =
      "⛔ La partie n'a pas encore démarré";
    return;
  }

  if (currentPlayer && myName !== currentPlayer) {
    document.getElementById("scanResult").textContent =
      `⛔ Ce n'est pas ton tour. C'est le tour de ${currentPlayer}`;
    return;
  }

  const reader =
    document.getElementById("reader");

  reader.style.display = "block";

  document.getElementById("scanResult").textContent =
    "📷 Scanner ouvert";

  if (html5QrCode) {
    try {
      await html5QrCode.stop();
      await html5QrCode.clear();
    } catch (e) {}
  }

console.log("Ouverture caméra...");

  html5QrCode = new Html5Qrcode("reader");
  await html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: 250
  },
  (decodedText) => {

    document.getElementById("scanResult").textContent =
    "🎲 Action envoyée à la TV";

    socket.emit("playerScannedCase", {
  playerName: myName,
  qr: decodedText,
  roomCode: savedRoomCode
});

    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      reader.style.display = "none";
    });

  },
  () => {}
);
    }

    async function nextPlayer() {

      if (html5QrCode) {
  try {
    await html5QrCode.stop();
  } catch (e) {
    console.log("Scanner déjà arrêté");
  }

  try {
    await html5QrCode.clear();
  } catch (e) {}

  html5QrCode = null;
}

      const reader = document.getElementById("reader");
      if (reader) {
        reader.style.display = "none";
      }

      const myName =
        localStorage.getItem("bibiperoPlayer");

      if (currentPlayer && myName !== currentPlayer) {
        document.getElementById("scanResult").textContent =
          `⛔ Tu ne peux pas passer le tour. C'est le tour de ${currentPlayer}`;
        return;
      }

      socket.emit(
  "nextPlayer",
  { roomCode: savedRoomCode },
  (response) => {
    if (!response || !response.ok) {
      document.getElementById("scanResult").textContent =
        "⛔ Impossible de passer le tour";
      return;
    }

    document.getElementById("scanResult").textContent =
      `⏳ En attente de ${response.state.currentPlayer}`;
  }
);
    }

    function resetGame() {
  socket.emit("newRound", {
    roomCode: savedRoomCode
  });

  document.getElementById("scanResult").textContent =
    "🔄 Nouvelle manche lancée";
}

  socket.emit("getState", { roomCode: savedRoomCode });

function newRound() {

  
  socket.emit("newRound", {
    roomCode: savedRoomCode
  });

  document.getElementById("scanResult").textContent =
    "🔄 Nouvelle manche lancée";
}

function resetSalon() {

  if (!confirm("Réinitialiser complètement le salon ?")) {
    return;
  }

  socket.emit("resetGame", {
    roomCode: savedRoomCode
  });
}

socket.on("gameReset", () => {
  localStorage.removeItem("bibiperoPlayer");
  localStorage.removeItem("bibiperoJoined");
  localStorage.removeItem("bibiperoRoomCode");

  window.location.href = "/join.html";
});
  </script>
<div id="actionPopup" class="action-popup hidden">
  <div class="action-card">
    <div id="actionEmoji" class="action-emoji">🍺</div>

    <div id="actionTitle" class="action-title">
      Titre
    </div>

    <div id="actionText" class="action-text">
      Texte
    </div>

    <button id="closeActionBtn" onclick="closeActionPopup()">
 🍺 OK 🍺
</button>
  </div>
</div>
</body>
</html>
